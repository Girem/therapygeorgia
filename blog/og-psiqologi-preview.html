<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      position: relative;
    }

    /* decorative circles */
    .circle-tr {
      position: absolute;
      top: -120px; right: -120px;
      width: 340px; height: 340px;
      border-radius: 50%;
      background: #E1F5EE;
    }
    .circle-bl {
      position: absolute;
      bottom: -100px; left: -100px;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: #E1F5EE;
    }
    .bar-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: #1D9E75;
    }

    /* center content */
    .content {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 820px;
    }

    .tag {
      display: inline-block;
      background: #E1F5EE;
      color: #0F6E56;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 99px;
      margin-bottom: 28px;
    }

    .title {
      font-size: 46px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 28px;
      letter-spacing: -0.01em;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #5DCAA5;
      margin: 0 auto 24px;
    }

    .brand {
      font-size: 20px;
      color: #888;
      letter-spacing: 0.01em;
    }
    .brand span { color: #1D9E75; font-weight: 500; }
  </style>
</head>
<body>
  <div class="bar-top"></div>
  <div class="circle-tr"></div>
  <div class="circle-bl"></div>

  <div class="content">
    <div class="tag">ფსიქიკური ჯანმრთელობა</div>
    <div class="title">ფსიქოლოგი, ფსიქოთერაპევტი<br>თუ ფსიქიატრი - ვის მივმართო?</div>
    <div class="divider"></div>
    <div class="brand">therapy<span>georgia</span>.ge</div>
  </div>
</body>
</html>
